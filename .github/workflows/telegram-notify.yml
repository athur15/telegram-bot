name: Telegram Notify

on:
  workflow_dispatch:
schedule:
  - cron: "0 16 * * *"
  - cron: "0 18 * * *"
  - cron: "0 20 * * *"
  - cron: "0 22 * * *"
  - cron: "0 0 * * *"
  - cron: "0 2 * * *"
jobs:
  send_message:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: python bot.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
